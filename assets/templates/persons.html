{{define "persons"}} {{template "layout_start" .}}

<header class="page-header">
    <hgroup>
        <h1>Persons</h1>
        <p>Contacts for outreach and follow-up.</p>
    </hgroup>

    <a href="/persons/new" role="button">New person…</a>
</header>

<section>
    <form method="get" action="/persons">
        <fieldset role="group">
            <input
                type="search"
                name="q"
                value="{{.Data.Query}}"
                placeholder="Search by name, company, position"
            />
            <button type="submit">Search</button>
        </fieldset>
    </form>

    <figure>
        <table class="striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Company</th>
                </tr>
            </thead>
            <tbody>
                {{range .Data.Persons}}
                <tr>
                    <td><a href="/persons/{{.ID}}">{{.Name}}</a></td>
                    <td>{{.Position}}</td>
                    <td>{{if .Company}}{{.Company}}{{else}}&mdash;{{end}}</td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="3">No persons found.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </figure>
    <nav class="pagination" aria-label="Persons pagination">
        {{if .Data.PreviousURL}}
        <a
            href="{{.Data.PreviousURL}}"
            role="button"
            class="secondary outline"
        >
            &larr; Previous
        </a>
        {{else}}
        <button type="button" class="secondary outline" disabled>
            &larr; Previous
        </button>
        {{end}}

        {{if .Data.NextURL}}
        <a
            href="{{.Data.NextURL}}"
            role="button"
            class="secondary outline"
        >
            Next &rarr;
        </a>
        {{else}}
        <button type="button" class="secondary outline" disabled>
            Next &rarr;
        </button>
        {{end}}
    </nav>
</section>

{{template "layout_end" .}} {{end}}
