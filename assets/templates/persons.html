{{define "persons"}} {{template "layout_start" .}}

<header>
    <hgroup>
        <h1>Persons</h1>
        <p>Contacts for outreach and follow-up.</p>
    </hgroup>
</header>

<section>
    <form method="get" action="/persons">
        <fieldset role="group">
            <input
                type="search"
                name="q"
                value="{{.Data.Query}}"
                placeholder="Search by name, company, position"
            />
            <button type="submit">Search</button>
        </fieldset>
    </form>

    <figure>
        <table class="striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Company</th>
                </tr>
            </thead>
            <tbody>
                {{range .Data.Persons}}
                <tr>
                    <td><a href="/persons/{{.ID}}">{{.Name}}</a></td>
                    <td>{{.Position}}</td>
                    <td>{{if .Company}}{{.Company}}{{else}}&mdash;{{end}}</td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="3">No persons found.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </figure>
    <div role="group" aria-label="Persons pagination">
        {{if .Data.PreviousURL}}
        <a href="{{.Data.PreviousURL}}" role="button" class="secondary">
            Previous
        </a>
        {{else}}
        <button type="button" class="secondary" disabled>Previous</button>
        {{end}}

        {{if .Data.NextURL}}
        <a href="{{.Data.NextURL}}" role="button" class="secondary">
            Next
        </a>
        {{else}}
        <button type="button" class="secondary" disabled>Next</button>
        {{end}}
    </div>
</section>

{{template "layout_end" .}} {{end}}
